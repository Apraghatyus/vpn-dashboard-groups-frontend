# ═══════════════════════════════════════════════
# WG-ACL Manager — Frontend
# Solo el frontend, independiente del backend
# ═══════════════════════════════════════════════

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wg-acl-frontend
    ports:
      - "3080:80"
    restart: unless-stopped
    networks:
      - wg-acl

networks:
  wg-acl:
    name: wg-acl-network
    driver: bridge
