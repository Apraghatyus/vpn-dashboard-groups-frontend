# ═══════════════════════════════════════════════
# WG-ACL Manager — Dev Compose
# Solo frontend con hot-reload (sin backend)
# ═══════════════════════════════════════════════

services:
  frontend-dev:
    image: node:20-alpine
    container_name: wg-acl-dev
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development

volumes:
  node_modules:
